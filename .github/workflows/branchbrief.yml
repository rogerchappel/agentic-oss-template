name: Branchbrief

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  branchbrief:
    name: Generate branchbrief
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build branchbrief summary
        run: |
          set -euo pipefail

          base_ref="${GITHUB_BASE_REF:-main}"
          head_ref="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          git fetch --no-tags origin "$base_ref:refs/remotes/origin/$base_ref"

          {
            echo "# Branchbrief"
            echo
            echo "- Base: \`$base_ref\`"
            echo "- Head: \`$head_ref\`"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo
            echo "## Recent Commits"
            echo
            git log --oneline "origin/$base_ref..HEAD" || true
            echo
            echo "## Changed Files"
            echo
            git diff --name-status "origin/$base_ref...HEAD" || true
            echo
            echo "## Diff Stat"
            echo
            git diff --stat "origin/$base_ref...HEAD" || true
          } > branchbrief.md

      - name: Upload branchbrief artifact
        uses: actions/upload-artifact@v4
        with:
          name: branchbrief
          path: branchbrief.md
          if-no-files-found: error
